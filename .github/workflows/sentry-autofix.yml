name: Sentry Autofix

on:
  workflow_call:
    inputs:
      new_relic_account_id:
        required: true
        type: string
      slack_channel_id:
        required: false
        type: string
        default: ''
      model:
        required: false
        type: string
        default: 'claude-opus-4-6'
      sentry_issue_id:
        required: true
        type: string
      sentry_url:
        required: true
        type: string
      error_title:
        required: true
        type: string
      error_culprit:
        required: false
        type: string
        default: ''
      extra_labels:
        required: false
        type: string
        default: ''
    secrets:
      anthropic_api_key:
        required: true
      sentry_api_token:
        required: true
      new_relic_api_key:
        required: true
      linear_api_key:
        required: true
      slack_bot_token:
        required: false

concurrency:
  group: sentry-autofix-${{ github.repository }}
  cancel-in-progress: false

jobs:
  autofix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Check hourly rate limit
        id: rate_limit
        env:
          GH_TOKEN: ${{ github.token }}
          SLACK_BOT_TOKEN: ${{ secrets.slack_bot_token }}
          SLACK_CHANNEL_ID: ${{ inputs.slack_channel_id }}
        run: |
          CUTOFF=$(date -u -d '1 hour ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-1H +%Y-%m-%dT%H:%M:%SZ)

          RECENT_COUNT=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow "Sentry Autofix" \
            --limit 20 \
            --json createdAt \
            --jq "[.[] | select(.createdAt > \"$CUTOFF\")] | length" 2>/dev/null || echo "0")
          RECENT_COUNT=${RECENT_COUNT:-0}

          echo "Autofix runs in the last hour: $RECENT_COUNT"
          echo "recent_count=$RECENT_COUNT" >> $GITHUB_OUTPUT

          if [ "$RECENT_COUNT" -ge 5 ]; then
            echo "rate_limited=true" >> $GITHUB_OUTPUT
            if [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL_ID" ]; then
              curl -s -X POST "https://slack.com/api/chat.postMessage" \
                -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                  \"channel\": \"$SLACK_CHANNEL_ID\",
                  \"text\": \"⚠️ [${{ github.repository }}] Sentry Autofix rate limit 초과 (${RECENT_COUNT}회/시간). 인프라 이슈 가능성이 있습니다. 수동 확인이 필요합니다.\n Sentry: ${{ inputs.sentry_url }}\"
                }"
            fi
          else
            echo "rate_limited=false" >> $GITHUB_OUTPUT
          fi

      - uses: drtail/actions/sentry-autofix@main
        if: steps.rate_limit.outputs.rate_limited == 'false'
        with:
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          sentry_api_token: ${{ secrets.sentry_api_token }}
          new_relic_api_key: ${{ secrets.new_relic_api_key }}
          new_relic_account_id: ${{ inputs.new_relic_account_id }}
          linear_api_key: ${{ secrets.linear_api_key }}
          slack_bot_token: ${{ secrets.slack_bot_token }}
          slack_channel_id: ${{ inputs.slack_channel_id }}
          model: ${{ inputs.model }}
          sentry_issue_id: ${{ inputs.sentry_issue_id }}
          sentry_url: ${{ inputs.sentry_url }}
          error_title: ${{ inputs.error_title }}
          error_culprit: ${{ inputs.error_culprit }}
          extra_labels: ${{ inputs.extra_labels }}
