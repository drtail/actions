name: 'Sentry Autofix'
description: 'AI-powered Sentry error auto-fix using Claude Code'
author: 'drtail'

inputs:
  anthropic_api_key:
    description: 'Anthropic API Key'
    required: true
  sentry_api_token:
    description: 'Sentry API Token for issue analysis'
    required: true
  new_relic_api_key:
    description: 'New Relic API Key for log analysis'
    required: true
  new_relic_account_id:
    description: 'New Relic Account ID'
    required: true
  linear_api_key:
    description: 'Linear API Key for issue creation'
    required: true
  slack_bot_token:
    description: 'Slack Bot Token for notifications'
    required: false
    default: ''
  slack_channel_id:
    description: 'Slack channel ID for autofix notifications'
    required: false
    default: ''
  slack_mention_user_id:
    description: 'Slack user ID to mention in notifications (e.g. U02J2GLUCHY)'
    required: false
    default: ''
  model:
    description: 'Claude model to use'
    required: false
    default: 'claude-opus-4-6'
  sentry_issue_id:
    description: 'Sentry issue short ID'
    required: true
  sentry_url:
    description: 'Sentry issue URL'
    required: true
  error_title:
    description: 'Error title from Sentry'
    required: true
  error_culprit:
    description: 'Error culprit from Sentry'
    required: false
    default: ''
  extra_labels:
    description: 'Additional labels to add to the PR (comma-separated)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # autofix 실행 "전" 시점의 열린 PR/이슈 번호를 스냅샷한다.
    # Notify 단계에서 이번 run 이 새로 생성한 PR/이슈만 정확히 식별하기 위함.
    - name: Snapshot open PRs and issues
      if: inputs.slack_bot_token != '' && inputs.slack_channel_id != ''
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
      run: |
        gh pr list --repo "$REPO" --state open --limit 100 \
          --json number --jq '[.[].number]' \
          > "$RUNNER_TEMP/autofix_prs_before.json" \
          || echo '[]' > "$RUNNER_TEMP/autofix_prs_before.json"
        gh issue list --repo "$REPO" --state open --limit 100 \
          --json number --jq '[.[].number]' \
          > "$RUNNER_TEMP/autofix_issues_before.json" \
          || echo '[]' > "$RUNNER_TEMP/autofix_issues_before.json"

    - name: Run Claude Code Autofix
      uses: anthropics/claude-code-action@v1
      with:
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        prompt: |
          REPO: ${{ github.repository }}

          You are fixing a Sentry error for the ${{ github.event.repository.name }} project.

          Sentry Issue: ${{ inputs.sentry_issue_id }}
          Sentry URL: ${{ inputs.sentry_url }}
          Error: ${{ inputs.error_title }}
          Culprit: ${{ inputs.error_culprit }}

          You have access to Sentry MCP and New Relic MCP tools.

          Steps:
          1. Read the CLAUDE.md file to understand the project conventions
          2. Analyze the Sentry issue using the Sentry MCP tool
          3. Check New Relic logs around the error time for additional context (use run_nrql_query to search logs)
          4. Understand the root cause from the stacktrace and logs
          5. Create a Linear issue for this bug fix:
             - Team: DRT
             - Title: the Sentry error title
             - Project: choose the most relevant project by listing existing projects. If unsure, use "Backend Bugs"
          6. Read the relevant source files and fix the bug
          7. Run the project's FULL pre-commit gate exactly as CI runs it — this is
             the same `pre-commit` check the PR's CI will enforce, so it must pass
             locally before you commit. Find the command in CLAUDE.md /
             .pre-commit-config.yaml / the CI workflow (commonly
             `uv run pre-commit run --all-files`, or `pre-commit run --all-files`).
             This runs BOTH the linter incl. import sorting (`ruff check`, rule I001)
             AND the formatter (`ruff format`). Running `ruff format` alone is NOT
             enough — it does not fix import order/lint issues and the CI `pre-commit`
             job will fail. Fix every issue reported and re-run until all hooks pass;
             if a hook auto-modifies files, stage those changes too.
          8. Run tests to verify the fix doesn't break anything
          9. Create a new branch using the Linear issue's branch name
          10. Commit the fix with message: "[DRT-<number>] <description>"
          11. Push the branch and create a PR with:
              - Title: "[DRT-<number>] Fix: <short description>"
              - Body following .github/pull_request_template.md, include Sentry URL in References
              - Checklist must include: "머지 후 Sentry 이슈 resolve"
              - Labels: 🤖 AI Review${{ inputs.extra_labels != '' && format(', {0}', inputs.extra_labels) || '' }}

          Important:
          - Follow the project conventions in CLAUDE.md
          - Write minimal, focused fixes - don't refactor unrelated code
          - The full pre-commit gate (see step 7) MUST pass before you commit and open
            the PR — never commit while any hook is failing
          - If you cannot determine the fix confidently, create a GitHub Issue explaining why instead of creating a PR
          - Always respond in Korean when commenting on issues or PRs

        settings: |
          {
            "mcpServers": {
              "sentry": {
                "command": "npx",
                "args": ["-y", "@sentry/mcp-server@latest"],
                "env": {
                  "SENTRY_AUTH_TOKEN": "${{ inputs.sentry_api_token }}"
                }
              },
              "newrelic": {
                "command": "npx",
                "args": ["-y", "@newrelic/mcp-server@latest"],
                "env": {
                  "NEW_RELIC_API_KEY": "${{ inputs.new_relic_api_key }}",
                  "NEW_RELIC_ACCOUNT_ID": "${{ inputs.new_relic_account_id }}",
                  "NEW_RELIC_REGION": "US"
                }
              },
              "linear": {
                "command": "npx",
                "args": ["-y", "@linear/mcp-server@latest"],
                "env": {
                  "LINEAR_API_KEY": "${{ inputs.linear_api_key }}"
                }
              }
            }
          }

        claude_args: '--model ${{ inputs.model }} --allowedTools "Read,Write,Edit,Bash,Glob,Grep,mcp__sentry__*,mcp__newrelic__*,mcp__linear__*,Bash(gh pr:*),Bash(gh issue:*),Bash(git:*),Bash(make:*),Bash(ruff:*)"'

    - name: Notify Slack
      if: success() && inputs.slack_bot_token != '' && inputs.slack_channel_id != ''
      shell: bash
      env:
        SLACK_BOT_TOKEN: ${{ inputs.slack_bot_token }}
        SLACK_CHANNEL_ID: ${{ inputs.slack_channel_id }}
        SLACK_MENTION_USER_ID: ${{ inputs.slack_mention_user_id }}
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        REPO_NAME: ${{ github.event.repository.name }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        # 멘션 텍스트 (옵션)
        MENTION_TEXT=""
        if [ -n "$SLACK_MENTION_USER_ID" ]; then
          MENTION_TEXT=" <@${SLACK_MENTION_USER_ID}>"
        fi

        # Slack 전송 헬퍼 — payload 를 jq 로 생성해 UTF-8/이스케이프를 안전하게 처리한다.
        post_slack() {
          jq -n --arg channel "$SLACK_CHANNEL_ID" --arg text "$1" \
            '{channel: $channel, text: $text, unfurl_links: false}' \
            | curl -s -X POST "https://slack.com/api/chat.postMessage" \
                -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
                -H "Content-Type: application/json" \
                --data @-
        }

        BEFORE_PRS="$RUNNER_TEMP/autofix_prs_before.json"
        BEFORE_ISSUES="$RUNNER_TEMP/autofix_issues_before.json"
        [ -f "$BEFORE_PRS" ] || echo '[]' > "$BEFORE_PRS"
        [ -f "$BEFORE_ISSUES" ] || echo '[]' > "$BEFORE_ISSUES"

        # 이번 run 이 "새로 생성한" PR 만 식별한다.
        # (기존 버그: 레포의 최신 열린 PR `.[0]` 을 집어 무관한 draft PR 을 autofix PR 로 오인 발송)
        # 규칙: 스냅샷 이후 새로 열린 PR → draft 제외 → 🤖 AI Review 라벨 우선 → 최신(createdAt).
        gh pr list --repo "$REPO" --state open --limit 100 \
          --json number,url,title,createdAt,isDraft,labels \
          > "$RUNNER_TEMP/autofix_prs_after.json" \
          || echo '[]' > "$RUNNER_TEMP/autofix_prs_after.json"

        PR_INFO=$(jq -n \
          --slurpfile before "$BEFORE_PRS" \
          --slurpfile after "$RUNNER_TEMP/autofix_prs_after.json" '
            ($before[0] // []) as $b
            | ($after[0] // [])
            | map(select((.number) as $n | ($b | index($n)) | not))
            | map(select(.isDraft | not))
            | (map(select(.labels | any(.name == "🤖 AI Review")))) as $labeled
            | (if ($labeled | length) > 0 then $labeled else . end)
            | sort_by(.createdAt) | last // empty
          ')
        PR_NUMBER=$(echo "$PR_INFO" | jq -r '.number // empty')
        PR_URL=$(echo "$PR_INFO" | jq -r '.url // empty')
        PR_TITLE=$(echo "$PR_INFO" | jq -r '.title // empty')

        if [ -n "$PR_URL" ]; then
          TEXT=$(printf '🔧 [%s] AI Autofix PR이 생성되었습니다.%s\n<%s|%s>' \
            "$REPO_NAME" "$MENTION_TEXT" "$PR_URL" "$PR_TITLE")
          RESPONSE=$(post_slack "$TEXT")

          SLACK_TS=$(echo "$RESPONSE" | jq -r '.ts // empty')
          SLACK_CHANNEL=$(echo "$RESPONSE" | jq -r '.channel // empty')

          if [ -n "$SLACK_TS" ] && [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" \
              --body "<!-- slack:${SLACK_CHANNEL}:${SLACK_TS} -->"
          fi
          exit 0
        fi

        # PR 이 없으면, 이번 run 이 새로 생성한 GitHub Issue 를 동일한 스냅샷 diff 로 식별.
        gh issue list --repo "$REPO" --state open --limit 100 \
          --json number,url,title,createdAt \
          > "$RUNNER_TEMP/autofix_issues_after.json" \
          || echo '[]' > "$RUNNER_TEMP/autofix_issues_after.json"

        ISSUE_INFO=$(jq -n \
          --slurpfile before "$BEFORE_ISSUES" \
          --slurpfile after "$RUNNER_TEMP/autofix_issues_after.json" '
            ($before[0] // []) as $b
            | ($after[0] // [])
            | map(select((.number) as $n | ($b | index($n)) | not))
            | sort_by(.createdAt) | last // empty
          ')
        ISSUE_URL=$(echo "$ISSUE_INFO" | jq -r '.url // empty')
        ISSUE_TITLE=$(echo "$ISSUE_INFO" | jq -r '.title // empty')

        if [ -n "$ISSUE_URL" ]; then
          TEXT=$(printf '📋 [%s] AI Autofix가 코드 수정 대신 GitHub Issue를 생성했습니다.%s\n<%s|%s>' \
            "$REPO_NAME" "$MENTION_TEXT" "$ISSUE_URL" "$ISSUE_TITLE")
          post_slack "$TEXT" > /dev/null
          exit 0
        fi

        # 새로 만든 PR/이슈가 전혀 없음 = autofix 가 결과물을 못 냄(크레딧 소진/판단 보류 등).
        # 기존엔 이 경우 무관한 최신 PR 을 오인 발송했다. 이제는 결과 없음을 알리고 run 로그를 가리킨다.
        TEXT=$(printf '⚠️ [%s] AI Autofix가 수정안(PR/Issue)을 생성하지 못했습니다. 런 로그를 확인해주세요.%s\n<%s|실행 로그 보기>' \
          "$REPO_NAME" "$MENTION_TEXT" "$RUN_URL")
        post_slack "$TEXT" > /dev/null
